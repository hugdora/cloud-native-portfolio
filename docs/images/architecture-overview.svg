<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace">

  <!-- Background -->
  <rect width="800" height="420" fill="#04060f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#4af0b8" font-size="13" font-weight="600" letter-spacing="2">PLATFORM ARCHITECTURE — doraejangue.com</text>
  <line x1="80" y1="48" x2="720" y2="48" stroke="#1a2444" stroke-width="1"/>

  <!-- ═══ USER ═══ -->
  <rect x="30" y="170" width="90" height="56" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="75" y="194" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="600">User</text>
  <text x="75" y="212" text-anchor="middle" fill="#3d4f7a" font-size="10">Browser</text>
  <text x="75" y="225" text-anchor="middle" fill="#3d4f7a" font-size="9">HTTPS request</text>

  <!-- Arrow user → route53 -->
  <line x1="120" y1="198" x2="158" y2="198" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="139" y="190" text-anchor="middle" fill="#3d4f7a" font-size="9">DNS</text>

  <!-- ═══ ROUTE 53 ═══ -->
  <rect x="160" y="170" width="110" height="56" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="215" y="191" text-anchor="middle" fill="#4af0b8" font-size="12" font-weight="600">Route 53</text>
  <text x="215" y="207" text-anchor="middle" fill="#7c8fbb" font-size="10">A alias record</text>
  <text x="215" y="220" text-anchor="middle" fill="#3d4f7a" font-size="9">doraejangue.com</text>

  <!-- Arrow route53 → cloudfront -->
  <line x1="270" y1="198" x2="308" y2="198" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="289" y="190" text-anchor="middle" fill="#3d4f7a" font-size="9">HTTPS</text>

  <!-- ═══ CLOUDFRONT (highlighted) ═══ -->
  <rect x="310" y="152" width="140" height="92" rx="6" fill="#080d1c" stroke="#4af0b8" stroke-width="2"/>
  <!-- top accent line -->
  <line x1="310" y1="152" x2="450" y2="152" stroke="#4af0b8" stroke-width="2" stroke-linecap="round"/>
  <text x="380" y="176" text-anchor="middle" fill="#4af0b8" font-size="13" font-weight="700">CloudFront</text>
  <text x="380" y="194" text-anchor="middle" fill="#7c8fbb" font-size="10">CDN · Global edge</text>
  <text x="380" y="210" text-anchor="middle" fill="#7c8fbb" font-size="10">HTTPS · ACM cert</text>
  <text x="380" y="226" text-anchor="middle" fill="#3d4f7a" font-size="9">CF Function URL rewrite</text>

  <!-- Arrow cloudfront → s3 -->
  <line x1="450" y1="198" x2="488" y2="198" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="469" y="190" text-anchor="middle" fill="#4af0b8" font-size="9" font-weight="600">OAC</text>

  <!-- ═══ S3 ═══ -->
  <rect x="490" y="162" width="120" height="72" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <!-- lock icon area -->
  <rect x="580" y="166" width="26" height="18" rx="3" fill="#0d1428" stroke="#1a2444" stroke-width="1"/>
  <text x="593" y="179" text-anchor="middle" fill="#4af0b8" font-size="10">🔒</text>
  <text x="548" y="186" text-anchor="middle" fill="#e8edf8" font-size="12" font-weight="600">S3 Bucket</text>
  <text x="548" y="202" text-anchor="middle" fill="#7c8fbb" font-size="10">Private origin</text>
  <text x="548" y="217" text-anchor="middle" fill="#3d4f7a" font-size="9">Block public access</text>
  <text x="548" y="228" text-anchor="middle" fill="#3d4f7a" font-size="9">Static Next.js export</text>

  <!-- ═══ ACM (below cloudfront) ═══ -->
  <rect x="330" y="272" width="100" height="40" rx="4" fill="#080d1c" stroke="#1a2444" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="380" y="289" text-anchor="middle" fill="#7c8fbb" font-size="10">ACM Certificate</text>
  <text x="380" y="303" text-anchor="middle" fill="#3d4f7a" font-size="9">us-east-1 (required)</text>
  <line x1="380" y1="272" x2="380" y2="244" stroke="#1a2444" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ═══ GITHUB ACTIONS (top section) ═══ -->
  <rect x="80" y="68" width="640" height="68" rx="6" fill="#080d1c" stroke="#1a2444" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="104" y="88" fill="#3a7fff" font-size="10" font-weight="600" letter-spacing="1">CI/CD — GITHUB ACTIONS</text>

  <!-- CI stages -->
  <rect x="100" y="96" width="60" height="26" rx="3" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="130" y="113" text-anchor="middle" fill="#7c8fbb" font-size="9">lint</text>

  <line x1="160" y1="109" x2="170" y2="109" stroke="#1a2444" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <rect x="172" y="96" width="72" height="26" rx="3" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="208" y="113" text-anchor="middle" fill="#7c8fbb" font-size="9">type-check</text>

  <line x1="244" y1="109" x2="254" y2="109" stroke="#1a2444" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <rect x="256" y="96" width="50" height="26" rx="3" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="281" y="113" text-anchor="middle" fill="#7c8fbb" font-size="9">test</text>

  <line x1="306" y1="109" x2="316" y2="109" stroke="#1a2444" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <rect x="318" y="96" width="55" height="26" rx="3" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="345" y="113" text-anchor="middle" fill="#7c8fbb" font-size="9">build</text>

  <line x1="373" y1="109" x2="383" y2="109" stroke="#1a2444" stroke-width="1" marker-end="url(#arrow-dim)"/>

  <rect x="385" y="96" width="70" height="26" rx="3" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="420" y="113" text-anchor="middle" fill="#7c8fbb" font-size="9">sec scan</text>

  <!-- Fork arrow to static deploy -->
  <line x1="455" y1="109" x2="490" y2="109" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Static deploy box -->
  <rect x="492" y="92" width="100" height="34" rx="3" fill="#0b1120" stroke="#4af0b8" stroke-width="1"/>
  <text x="542" y="106" text-anchor="middle" fill="#4af0b8" font-size="9" font-weight="600">Static deploy</text>
  <text x="542" y="119" text-anchor="middle" fill="#3d4f7a" font-size="8">s3 sync + invalidate</text>

  <!-- Arrow static deploy → S3 (going down) -->
  <line x1="552" y1="126" x2="552" y2="162" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- K8s deploy box -->
  <rect x="604" y="92" width="100" height="34" rx="3" fill="#0b1120" stroke="#3a7fff" stroke-width="1"/>
  <text x="654" y="106" text-anchor="middle" fill="#3a7fff" font-size="9" font-weight="600">K8s deploy</text>
  <text x="654" y="119" text-anchor="middle" fill="#3d4f7a" font-size="8">helm upgrade</text>

  <!-- ═══ KUBERNETES CLUSTER ═══ -->
  <rect x="624" y="162" width="146" height="110" rx="6" fill="transparent" stroke="#3a7fff" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="640" y="180" fill="#3a7fff" font-size="9" font-weight="600" letter-spacing="1">K8S CLUSTER</text>

  <!-- Arrow k8s deploy → cluster -->
  <line x1="654" y1="126" x2="697" y2="162" stroke="#3a7fff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="636" y="186" width="120" height="28" rx="3" fill="#080d1c" stroke="#2a3a60" stroke-width="1"/>
  <text x="696" y="204" text-anchor="middle" fill="#e8edf8" font-size="10">Ingress NGINX</text>

  <rect x="636" y="220" width="55" height="24" rx="3" fill="#080d1c" stroke="#1a2444" stroke-width="1"/>
  <text x="663" y="236" text-anchor="middle" fill="#7c8fbb" font-size="9">Pod · Pod</text>

  <rect x="700" y="220" width="52" height="24" rx="3" fill="#080d1c" stroke="#1a2444" stroke-width="1"/>
  <text x="726" y="236" text-anchor="middle" fill="#7c8fbb" font-size="9">Helm</text>

  <!-- ═══ TERRAFORM label ═══ -->
  <rect x="30" y="320" width="560" height="36" rx="4" fill="#080d1c" stroke="#1a2444" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="50" y="336" fill="#3d4f7a" font-size="9" font-weight="600" letter-spacing="1">TERRAFORM — Infrastructure as Code</text>
  <text x="50" y="350" fill="#3d4f7a" font-size="9">S3 · CloudFront · OAC · ACM · Route 53 · IAM OIDC · Bucket Policy</text>

  <!-- ═══ IAM OIDC badge ═══ -->
  <rect x="30" y="272" width="110" height="40" rx="4" fill="#080d1c" stroke="#1a2444" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="85" y="289" text-anchor="middle" fill="#7c8fbb" font-size="10">IAM OIDC</text>
  <text x="85" y="303" text-anchor="middle" fill="#3d4f7a" font-size="9">No stored keys</text>

  <!-- IAM line to GitHub Actions -->
  <line x1="85" y1="272" x2="200" y2="136" stroke="#1a2444" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ═══ LEGEND ═══ -->
  <line x1="490" y1="370" x2="510" y2="370" stroke="#4af0b8" stroke-width="2"/>
  <text x="516" y="374" fill="#7c8fbb" font-size="9">Static path</text>
  <line x1="580" y1="370" x2="600" y2="370" stroke="#3a7fff" stroke-width="2"/>
  <text x="606" y="374" fill="#7c8fbb" font-size="9">K8s path</text>
  <line x1="660" y1="370" x2="680" y2="370" stroke="#1a2444" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="686" y="374" fill="#7c8fbb" font-size="9">IaC / Auth</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4af0b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a7fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2a3a60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>

<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace">

  <rect width="800" height="380" fill="#04060f"/>

  <text x="400" y="36" text-anchor="middle" fill="#4af0b8" font-size="13" font-weight="600" letter-spacing="2">TERRAFORM — AWS INFRASTRUCTURE</text>
  <line x1="80" y1="48" x2="720" y2="48" stroke="#1a2444" stroke-width="1"/>

  <defs>
    <marker id="tf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4af0b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="tf-arrow-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2a3a60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══ MODULE box ═══ -->
  <rect x="60" y="66" width="680" height="246" rx="8" fill="transparent" stroke="#1a2444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="82" y="86" fill="#3d4f7a" font-size="9" font-weight="600" letter-spacing="2">MODULE: infra/modules/s3_site</text>

  <!-- ═══ S3 Bucket ═══ -->
  <rect x="90" y="100" width="140" height="80" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="160" y="122" text-anchor="middle" fill="#4af0b8" font-size="12" font-weight="700">aws_s3_bucket</text>
  <text x="160" y="140" text-anchor="middle" fill="#7c8fbb" font-size="10">Private origin</text>
  <text x="160" y="156" text-anchor="middle" fill="#3d4f7a" font-size="9">bucket_name = var</text>
  <text x="160" y="170" text-anchor="middle" fill="#3d4f7a" font-size="9">versioning enabled</text>

  <!-- S3 Public Access Block -->
  <rect x="90" y="196" width="140" height="60" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="160" y="216" text-anchor="middle" fill="#e8edf8" font-size="10" font-weight="600">public_access_block</text>
  <text x="160" y="232" text-anchor="middle" fill="#3d4f7a" font-size="9">block_public_acls = true</text>
  <text x="160" y="246" text-anchor="middle" fill="#3d4f7a" font-size="9">restrict_public = true</text>

  <!-- line s3 → public block -->
  <line x1="160" y1="180" x2="160" y2="196" stroke="#2a3a60" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- ═══ OAC ═══ -->
  <rect x="270" y="100" width="150" height="80" rx="6" fill="#080d1c" stroke="#4af0b8" stroke-width="1.5"/>
  <text x="345" y="122" text-anchor="middle" fill="#4af0b8" font-size="11" font-weight="700">cloudfront_oac</text>
  <text x="345" y="140" text-anchor="middle" fill="#7c8fbb" font-size="10">Origin Access Control</text>
  <text x="345" y="156" text-anchor="middle" fill="#3d4f7a" font-size="9">signing_behavior = always</text>
  <text x="345" y="170" text-anchor="middle" fill="#3d4f7a" font-size="9">signing_protocol = sigv4</text>

  <!-- ═══ CloudFront Distribution ═══ -->
  <rect x="270" y="196" width="150" height="90" rx="6" fill="#080d1c" stroke="#4af0b8" stroke-width="2"/>
  <text x="345" y="218" text-anchor="middle" fill="#4af0b8" font-size="12" font-weight="700">cloudfront_dist</text>
  <text x="345" y="235" text-anchor="middle" fill="#7c8fbb" font-size="10">default_root = index.html</text>
  <text x="345" y="250" text-anchor="middle" fill="#3d4f7a" font-size="9">redirect-to-https</text>
  <text x="345" y="264" text-anchor="middle" fill="#3d4f7a" font-size="9">ACM cert attached</text>
  <text x="345" y="278" text-anchor="middle" fill="#3d4f7a" font-size="9">geo restriction = none</text>

  <!-- line oac → cloudfront -->
  <line x1="345" y1="180" x2="345" y2="196" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#tf-arrow)"/>

  <!-- line s3 → oac (horizontal) -->
  <line x1="230" y1="140" x2="270" y2="140" stroke="#4af0b8" stroke-width="1.5" marker-end="url(#tf-arrow)"/>

  <!-- ═══ Bucket Policy ═══ -->
  <rect x="460" y="100" width="150" height="80" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="535" y="122" text-anchor="middle" fill="#e8edf8" font-size="11" font-weight="600">s3_bucket_policy</text>
  <text x="535" y="140" text-anchor="middle" fill="#7c8fbb" font-size="10">Allow CloudFront only</text>
  <text x="535" y="156" text-anchor="middle" fill="#3d4f7a" font-size="9">Principal: cloudfront.amazonaws.com</text>
  <text x="535" y="170" text-anchor="middle" fill="#3d4f7a" font-size="9">Condition: SourceArn = CF ARN</text>

  <!-- arrow CF → bucket policy (ref) -->
  <line x1="420" y1="241" x2="460" y2="140" stroke="#2a3a60" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#tf-arrow-dim)"/>

  <!-- ═══ IAM OIDC ═══ -->
  <rect x="460" y="196" width="150" height="90" rx="6" fill="#080d1c" stroke="#2a3a60" stroke-width="1.5"/>
  <text x="535" y="218" text-anchor="middle" fill="#e8edf8" font-size="11" font-weight="600">iam_oidc_provider</text>
  <text x="535" y="235" text-anchor="middle" fill="#7c8fbb" font-size="10">GitHub Actions trust</text>
  <text x="535" y="251" text-anchor="middle" fill="#3d4f7a" font-size="9">url: token.actions.githubusercontent.com</text>
  <text x="535" y="266" text-anchor="middle" fill="#3d4f7a" font-size="9">No long-lived keys</text>
  <text x="535" y="280" text-anchor="middle" fill="#4af0b8" font-size="9">✓ Keyless auth</text>

  <!-- ═══ Environments ═══ -->
  <rect x="90" y="330" width="140" height="32" rx="4" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="160" y="344" text-anchor="middle" fill="#3a7fff" font-size="9" font-weight="600">envs/dev</text>
  <text x="160" y="356" text-anchor="middle" fill="#3d4f7a" font-size="8">terraform.tfvars (gitignored)</text>

  <rect x="250" y="330" width="140" height="32" rx="4" fill="#0b1120" stroke="#1a2444" stroke-width="1"/>
  <text x="320" y="344" text-anchor="middle" fill="#3a7fff" font-size="9" font-weight="600">envs/prod</text>
  <text x="320" y="356" text-anchor="middle" fill="#3d4f7a" font-size="8">terraform.tfvars (gitignored)</text>

  <text x="430" y="346" fill="#3d4f7a" font-size="9">← both call the same module</text>

  <!-- outputs -->
  <rect x="620" y="310" width="140" height="52" rx="4" fill="#080d1c" stroke="#1a2444" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="690" y="328" text-anchor="middle" fill="#3d4f7a" font-size="9" font-weight="600">OUTPUTS</text>
  <text x="690" y="342" text-anchor="middle" fill="#3d4f7a" font-size="8">bucket_name · bucket_arn</text>
  <text x="690" y="355" text-anchor="middle" fill="#3d4f7a" font-size="8">cloudfront_domain · cf_arn</text>

</svg>
